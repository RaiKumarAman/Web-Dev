<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Masterclass</title>
    <style>
        .container{
            border: 1px solid black;
            margin: 10px;
        }
        .grid-container{
            display:grid;
            margin: 20px;
        }
        .box{
            background-color: skyblue;
            border: 1px solid black;
            padding: 10px;
            font-weight:bolder;
        }
        .box:nth-child(even){
            background-color: coral;

        }
        
    </style>
</head>
<body>
    <div class="container">
        <h2>1. Basic Grid 3x3</h2>
        <div class="grid-container"
            style="grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,100px);"

        > 
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
            <div class="box">7</div>
            <div class="box">8</div>
            <div class="box">9</div>
        </div>
    </div>

    <div class="container">
        <h2>2. Grid with different Size</h2>
        <div class="grid-container"
            style="grid-template-columns:1fr 2fr 1fr "
        > 
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </div>

    <div class="container">
        <h2>3. Grid with Gaps</h2>
        <div class="grid-container"
            style="grid-template-columns:repear(3,1fr); gap:20px"
        > 
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </div>

    <div class="container">
        <h2>4. Grid Items Placement</h2>
        <div class="grid-container"
            style="grid-template-columns: repeat(3, 1fr);
                    grid-template-rows: repeat(3, 100px);
                    "
        > 
            <div class="box" style="grid-column: 1/3;
            grid-row: 1/3;">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box" style="grid-column: 2/4;">5</div>
        </div>
    </div>

    <div class="container">
        <h2>5. Grid Template Area</h2>
        <div class="grid-container"
            style=" grid-template-areas: 'header header header' 'siderbar main main' 'footer footer footer';"
        > 
            <div class="box" style="grid-area: header">Header</div>
            <div class="box" style="grid-area: siderbar">Sidebar</div>
            <div class="box" style="grid-area:main">Main Content</div>
            <div class="box" style="grid-area: footer">Footer</div>
        </div>
    </div>

     <div class="container">
        <h2>6. Auto-Fit and Minmax</h2>
        <div class="grid-container"
            style="grid-template-columns: repeat(Auto-Fit, Minmax(100px, 1fr));"

        > 
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </div>

    <div class="container">
        <h2>7. justify-content and align-items</h2>
        <div class="grid-container"
            style="grid-template-columns: repeat(3, 1fr);
            justify-content: center;
            align-items: end;"
        > 
            <div class="box">1</div>
            <div class="box">2</div>

        </div>
    </div>
    


</body>
</html>
