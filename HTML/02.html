<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h4>Unordered</h4>
    <ul>
        <li>Superman</li>
        <li>Batman</li>
        <li>Flash</li>
    </ul>
    <h4>Ordered</h4>
    <ol>
        <li>Avengers <i>Assemble</i>f</li>
        <li>Justice <strong>Go</strong></li>
    </ol>
    
</body>
</html>
